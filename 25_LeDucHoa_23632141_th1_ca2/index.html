<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân sinh viên</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="card">

        <!-- ===== Cột trái ===== -->
        <aside class="left-col">

            <!-- Ảnh đại diện -->
            <div id="avatar">
                <img class="avatar" src="images/image.jpg" alt="Avatar">
            </div>


        </aside>

        <!-- ===== Cột phải ===== -->
        <main class="right-col">
            <h1>BẢNG THÔNG TIN</h1>
            <aside class="left-col">
                <!-- Họ tên -->
                <div id="full-name">
                    <h2>Tên: Lê Đức Hòa</h2>

                </div>
                <!-- Mã sinh viên (ẩn - chỉ có trong mã nguồn) -->
                <div id="student-id">23632141</div>
                <!-- Email -->
                <div id="email">
                    <p class="email-info">
                        Email: lehoa190605@gmail.com
                    </p>
                </div>
                <div id="full-name">
                    <h3>Ngành: Khoa học dữ liệu</h3>
                    <h3>Trường: Đại học Công nghiệp Thành phố HCM</h3>
                </div>

                <!-- Liên kết mạng xã hội -->
                <div class="social">
                    <div id="github-link">
                        <a href="https://github.com/phoret17" target="_blank">
                            <i class="fa-brands fa-github"></i> Github
                        </a>
                    </div>

                    <div id="linkedin-link">
                        <a href="https://www.linkedin.com/in/hoaleduc/" target="_blank">
                            <i class="fa-brands fa-linkedin"></i> LinkedIn
                        </a>
                    </div>
                </div>

            </aside>

            <!-- Sở thích -->
            <div class="info-block">
                <h2>Sở thích</h2>
                <div id="hobbies">
                    <ul class="info-list">
                        <li>- Lập trình</li>
                        <li>- Chơi game</li>
                        <li>- Đọc sách công nghệ</li>
                        <li>- Nghe nhạc</li>
                    </ul>
                </div>
            </div>

        </main>

    </div>

</body>

</html>
